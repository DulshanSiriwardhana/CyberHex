name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run ESLint
        run: cd backend && npm run lint || true

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7-alpine
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test
        env:
          DB_URI: mongodb://localhost:27017/cyberhex
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          NODE_ENV: test

  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: [ lint-backend, test-backend ]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Run ESLint
        run: cd client && npm run lint || true

      - name: Type check with TypeScript
        run: cd client && npm run build 2>&1 | head -20 || true

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Run client tests
        run: cd client && npm test -- --run || true

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [ lint-client, test-client ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build
        env:
          VITE_API_BASE_URL: /api/v1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 1

  build-cpp:
    name: Build C++ Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure CMake
        run: cd ML/models/cpp-modules && cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cd ML/models/cpp-modules && cmake --build build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit on backend
        run: cd backend && npm audit --audit-level=moderate || true

      - name: Run npm audit on client
        run: cd client && npm audit --audit-level=moderate || true

  docker-compose-validation:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker-compose config -f docker-compose.yml > /dev/null

      - name: Build Docker images
        run: |
          docker-compose build --no-cache backend
          docker-compose build --no-cache frontend

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ lint-backend, test-backend, build-backend, lint-client, test-client, build-client, build-cpp, security-scan, docker-compose-validation ]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ job.status }}" == "failure" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          else
            echo "✅ CI pipeline passed"
          fi
